<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>OG template</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" />
  <style>
    :root {
      --bg: #0b0f0c;
      --surface: #0f1411;
      --surface-alt: #141a16;
      --text: #e7ecea;
      --text-dim: #93a19b;
      --text-dim2: #6b7773;
      --primary: #5bf591;
      --primary-dim: rgba(91, 245, 145, 0.15);
      --amber: #e6b855;
      --amber-dim: rgba(230, 184, 85, 0.15);
      --border: #1e2623;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 1200px;
      height: 630px;
      background: var(--bg);
      color: var(--text);
      font-family: "IBM Plex Mono", ui-monospace, monospace;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }
    /* Scanlines + vignette */
    body::before {
      content: '';
      position: absolute; inset: 0;
      background:
        repeating-linear-gradient(
          to bottom,
          rgba(91, 245, 145, 0.022) 0,
          rgba(91, 245, 145, 0.022) 1px,
          transparent 1px,
          transparent 3px
        ),
        radial-gradient(ellipse at center, transparent 35%, rgba(0,0,0,0.45) 100%);
      pointer-events: none;
      z-index: 1;
    }

    /* Reticle corners */
    .reticle {
      position: absolute;
      z-index: 0;
      pointer-events: none;
      border: 1px solid var(--primary);
      opacity: 0.35;
    }
    .reticle.tl { top: 28px; left: 28px;    width: 18px; height: 18px; border-right: none; border-bottom: none; }
    .reticle.tr { top: 28px; right: 28px;   width: 18px; height: 18px; border-left: none;  border-bottom: none; }
    .reticle.bl { bottom: 28px; left: 28px; width: 18px; height: 18px; border-right: none; border-top: none; }
    .reticle.br { bottom: 28px; right: 28px;width: 18px; height: 18px; border-left: none;  border-top: none; }

    .frame {
      position: relative;
      z-index: 2;
      width: 100%; height: 100%;
      padding: 56px 64px 88px;
      display: grid;
      grid-template-columns: 1fr 1.18fr;
      gap: 48px;
      align-items: center;
    }

    /* ---- Left column ---- */
    .left { display: flex; flex-direction: column; gap: 28px; }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      font-family: "JetBrains Mono", monospace;
      line-height: 1;
    }
    .brand .brand-icon { width: 32px; height: 32px; flex-shrink: 0; }
    .brand .brand-name {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
    }
    .brand .brand-lab {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.2em;
      color: var(--text);
      border: 1px solid var(--text);
      padding: 3px 8px;
      align-self: center;
    }

    .eyebrow {
      font-size: 13px;
      color: var(--primary);
      text-transform: uppercase;
      letter-spacing: 0.16em;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-weight: 500;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--primary);
      box-shadow: 0 0 10px var(--primary);
      flex-shrink: 0;
    }

    h1 {
      font-family: "JetBrains Mono", monospace;
      font-size: 56px;
      line-height: 1.02;
      letter-spacing: -0.02em;
      font-weight: 700;
      white-space: pre-line;
      word-break: keep-all;
      overflow-wrap: normal;
    }
    h1 .accent { color: var(--primary); white-space: nowrap; }
    h1 .line { display: block; }
    h1 .cursor {
      display: inline-block;
      width: 0.55em; height: 1em;
      background: var(--primary);
      vertical-align: -0.12em;
      margin-left: 6px;
    }

    .subtitle {
      font-size: 16px;
      line-height: 1.55;
      color: var(--text-dim);
      max-width: 520px;
    }

    .meta {
      display: flex;
      gap: 20px;
      font-size: 12px;
      color: var(--text-dim2);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      flex-wrap: wrap;
    }
    .meta span { display: inline-flex; align-items: center; gap: 8px; }
    .meta .dot { width: 6px; height: 6px; }

    /* ---- Right column: floating chart ---- */
    .chart-wrap {
      width: 100%;
      height: 460px;
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .chart-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
    }
    .chart-head .left-head { display: flex; gap: 18px; align-items: center; }
    .chart-head .legend {
      display: inline-flex;
      gap: 6px;
      align-items: center;
    }
    .chart-head .swatch-line {
      width: 18px; height: 2px;
      background: var(--primary);
    }
    .chart-head .swatch-dash {
      width: 18px; height: 2px;
      background: repeating-linear-gradient(90deg, var(--amber) 0 4px, transparent 4px 8px);
    }
    .chart-head .live {
      color: var(--primary);
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-weight: 600;
    }
    .chart-svg {
      flex: 1;
      width: 100%;
      height: 100%;
      display: block;
    }

    /* Footer strip */
    .bottom {
      position: absolute;
      z-index: 3;
      bottom: 32px;
      left: 64px;
      right: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim2);
    }
    .domain {
      font-weight: 700;
      color: var(--text);
      letter-spacing: 0.1em;
    }

    .svg-axis { font: 10px "JetBrains Mono", monospace; fill: var(--text-dim2); }
    .svg-axis-primary { font: 10px "JetBrains Mono", monospace; fill: var(--primary); }
    .svg-axis-amber   { font: 10px "JetBrains Mono", monospace; fill: var(--amber); }
    .svg-dose-label   { font: 700 9px "JetBrains Mono", monospace; fill: var(--bg); }
  </style>
</head>
<body>
  <span class="reticle tl"></span>
  <span class="reticle tr"></span>
  <span class="reticle bl"></span>
  <span class="reticle br"></span>

  <div class="frame">
    <div class="left">
      <div class="brand">
        <!-- T02 PK glyph — keep in sync with src/brand/pk-glyph.js. Regenerate via `node scripts/extract-pk-glyph.mjs`. -->
        <svg class="brand-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M28.760 62L19.760 62L19.760 18.200L34.700 18.200Q39.320 18.200 42.770 19.940Q46.220 21.680 48.110 24.800Q50.000 27.920 50.000 32.120L50.000 32.120Q50.000 36.260 48.080 39.410Q46.160 42.560 42.740 44.300Q39.320 46.040 34.700 46.040L34.700 46.040L28.760 46.040L28.760 62ZM28.760 26L28.760 38.240L34.700 38.240Q37.580 38.240 39.290 36.500Q41 34.760 41 32.120L41 32.120Q41 29.480 39.290 27.740Q37.580 26 34.700 26L34.700 26L28.760 26Z M61.100 62L52.100 62L52.100 18.200L61.100 18.200L61.100 35.360L65.300 35.360L72.620 18.200L82.340 18.200L73.220 38.900L82.700 62L72.860 62L65.360 43.220L61.100 43.220L61.100 62Z" fill="#e7ecea"/>
        </svg>
        <span class="brand-name">Protokol</span>
        <span class="brand-lab">LAB</span>
      </div>

      <div class="eyebrow"><span class="dot"></span><span id="eyebrow">Loading…</span></div>

      <h1 id="title">Loading…</h1>

      <p class="subtitle" id="subtitle">Loading…</p>
    </div>

    <div class="right">
      <div class="chart-wrap">
        <div class="chart-head">
          <div class="left-head">
            <span class="legend"><span class="swatch-line"></span><span>Weight</span></span>
            <span class="legend"><span class="swatch-dash"></span><span>Tirzepatide active</span></span>
          </div>
          <span class="live"><span class="dot"></span>LIVE</span>
        </div>
        <svg id="chart" class="chart-svg" viewBox="0 0 620 410" preserveAspectRatio="xMidYMid meet"></svg>
      </div>
    </div>
  </div>

  <div class="bottom">
    <span>For Tirzepatide · Semaglutide · Mounjaro · Zepbound · Ozempic · Wegovy</span>
    <span class="domain">protokollab.com</span>
  </div>

  <script>
    // ---- Query-param config ----
    // title / accent can include `|` to mark an explicit line break.
    //   title = "The tracker|built for GLP-1s."
    //   accent = "built for GLP-1s."
    // renders as two lines with the accent wrapped in <span class="accent"> and nowrap.
    const q = new URLSearchParams(location.search);
    const eyebrow = q.get('eyebrow') || 'Tirzepatide · Semaglutide · Mounjaro · Zepbound · Ozempic · Wegovy';
    const title = q.get('title') || 'The tracker|built for GLP-1s.';
    const subtitle = q.get('subtitle') || '';
    const accent = q.get('accent') || '';
    // Static image — cursor off by default (the blinking cursor on the live hero
    // becomes an awkward block in a still image).
    const showCursor = q.get('cursor') === '1';
    // Chart variant selector. Today every variant renders the PK chart; new
    // variants (pricing tiers, tool-trail, compound list) can branch in
    // renderChart() by checking this value.
    const chartVariant = q.get('chartVariant') || 'pk';

    document.getElementById('eyebrow').textContent = eyebrow;
    document.getElementById('subtitle').textContent = subtitle;

    const titleEl = document.getElementById('title');
    const cursorHtml = showCursor ? '<span class="cursor"></span>' : '';

    function renderLine(text, isLast) {
      let html = text;
      if (accent && text.includes(accent)) {
        const idx = text.indexOf(accent);
        const before = text.slice(0, idx);
        const after = text.slice(idx + accent.length);
        html = before + '<span class="accent">' + accent + '</span>' + after;
      }
      if (isLast) html += cursorHtml;
      return '<span class="line">' + html + '</span>';
    }

    const lines = title.split('|');
    titleEl.innerHTML = lines.map((l, i) => renderLine(l, i === lines.length - 1)).join('');

    // ---- PK + weight chart (Bateman) — mirrors LandingPage hero ----
    function subqDose(t, mg, halfLifeDays) {
      if (t < 0) return 0;
      const ka = Math.LN2 / 0.25;
      const ke = Math.LN2 / halfLifeDays;
      if (Math.abs(ka - ke) < 1e-6) return mg * ke * t * Math.exp(-ke * t);
      return mg * (ka / (ka - ke)) * (Math.exp(-ke * t) - Math.exp(-ka * t));
    }

    function renderChart() {
      const svg = document.getElementById('chart');
      const W = 620, H = 410;
      // Reserve room at top for axis labels, bottom for dose pill row + date axis.
      const pad = { t: 20, r: 52, b: 54, l: 52 };
      const W0 = W - pad.l - pad.r, H0 = H - pad.t - pad.b;

      // Weekly tirzepatide dose escalation over 8 weeks. Fewer weeks than
      // the real dashboard so dose pills have room to breathe at OG scale.
      // Resolution = samples/day keeps the sub-Q Bateman curve smooth.
      const weeks = 8;
      const days = weeks * 7;
      const samplesPerDay = 6;
      const N = days * samplesPerDay + 1;

      const mgSteps = [2.5, 2.5, 5, 5, 7.5, 7.5, 10, 10];
      const doses = mgSteps.map((mg, wk) => ({ day: wk * 7, mg }));
      const halfLife = 5;

      const pk = new Array(N);
      for (let i = 0; i < N; i++) {
        const t = i / samplesPerDay;
        let a = 0;
        for (const d of doses) a += subqDose(t - d.day, d.mg, halfLife);
        pk[i] = a;
      }

      // Weight: smooth -14 lb drop over 8 weeks + daily noise
      const weight = new Array(N);
      for (let i = 0; i < N; i++) {
        const t = i / samplesPerDay;
        const tr = t / days;
        weight[i] = 226 - tr * 14 + Math.sin(t * 0.55) * 0.6 + Math.cos(t * 1.1) * 0.35;
      }

      const ix = (i) => pad.l + (i / (N - 1)) * W0;
      const wMin = Math.min(...weight) - 1, wMax = Math.max(...weight) + 1;
      const wy = (v) => pad.t + (1 - (v - wMin) / (wMax - wMin)) * H0;
      const pkMax = Math.max(...pk) * 1.1;
      const py = (v) => pad.t + (1 - v / pkMax) * H0;

      const weightPath = weight.map((v, i) => (i === 0 ? 'M' : 'L') + ix(i).toFixed(1) + ',' + wy(v).toFixed(1)).join(' ');
      const pkPath = pk.map((v, i) => (i === 0 ? 'M' : 'L') + ix(i).toFixed(1) + ',' + py(v).toFixed(1)).join(' ');
      const pkArea = pkPath + ' L' + ix(N - 1).toFixed(1) + ',' + (pad.t + H0) + ' L' + ix(0).toFixed(1) + ',' + (pad.t + H0) + ' Z';

      const grid = Array.from({ length: 5 }, (_, i) => pad.t + (i / 4) * H0);
      const padB = pad.t + H0;
      const right = W - pad.r;

      let s = '';

      // Grid
      for (const y of grid) {
        s += '<line x1="' + pad.l + '" x2="' + right + '" y1="' + y + '" y2="' + y + '" stroke="#1e2623" stroke-width="1" stroke-dasharray="1 3" />';
      }

      // PK area + curve (amber, more visible fill under the curve)
      s += '<path d="' + pkArea + '" fill="rgba(230,184,85,0.18)" />';
      s += '<path d="' + pkPath + '" fill="none" stroke="#e6b855" stroke-width="1.75" stroke-dasharray="5 3" opacity="0.95" />';

      // Weight line (primary, thick)
      s += '<path d="' + weightPath + '" fill="none" stroke="#5bf591" stroke-width="2.5" stroke-linejoin="round" />';

      // Dose markers: thin dashed vertical from baseline to top, then a
      // small pill beneath the axis with the mg label. No overlap.
      for (const d of doses) {
        const x = ix(d.day * samplesPerDay);
        // thin dashed vertical guide
        s += '<line x1="' + x + '" x2="' + x + '" y1="' + pad.t + '" y2="' + padB + '" stroke="#e6b855" stroke-width="0.6" stroke-dasharray="2 3" opacity="0.3" />';
        // amber tick on the axis
        s += '<line x1="' + x + '" x2="' + x + '" y1="' + padB + '" y2="' + (padB + 5) + '" stroke="#e6b855" stroke-width="1.5" />';
        // pill with mg label below the axis
        const pillY = padB + 14;
        s += '<rect x="' + (x - 16) + '" y="' + pillY + '" width="32" height="14" rx="2" fill="#1a1f1c" stroke="#e6b855" stroke-width="0.75" />';
        s += '<text x="' + x + '" y="' + (pillY + 10) + '" text-anchor="middle" style="font: 700 9px \'JetBrains Mono\', monospace; fill: #e6b855;">' + d.mg + 'mg</text>';
      }

      // Left axis: weight (green)
      s += '<text x="' + (pad.l - 10) + '" y="' + (pad.t + 4) + '" text-anchor="end" class="svg-axis-primary" style="font-weight: 600;">' + wMax.toFixed(0) + '</text>';
      s += '<text x="' + (pad.l - 10) + '" y="' + (padB + 4) + '" text-anchor="end" class="svg-axis-primary" style="font-weight: 600;">' + wMin.toFixed(0) + '</text>';
      s += '<text x="' + (pad.l - 10) + '" y="' + (pad.t - 8) + '" text-anchor="end" style="font: 9px \'JetBrains Mono\', monospace; fill: #6b7773; letter-spacing: 0.1em;">LBS</text>';

      // Right axis: active mg (amber)
      s += '<text x="' + (right + 10) + '" y="' + (pad.t + 4) + '" text-anchor="start" class="svg-axis-amber" style="font-weight: 600;">' + pkMax.toFixed(1) + '</text>';
      s += '<text x="' + (right + 10) + '" y="' + (padB + 4) + '" text-anchor="start" class="svg-axis-amber" style="font-weight: 600;">0</text>';
      s += '<text x="' + (right + 10) + '" y="' + (pad.t - 8) + '" text-anchor="start" style="font: 9px \'JetBrains Mono\', monospace; fill: #6b7773; letter-spacing: 0.1em;">MG</text>';

      // Bottom axis: "8 weeks ago" → "today" so readers immediately see scale.
      const weekLabelY = H - 6;
      s += '<text x="' + pad.l + '" y="' + weekLabelY + '" text-anchor="start" style="font: 10px \'JetBrains Mono\', monospace; fill: #6b7773; letter-spacing: 0.08em;">8W AGO</text>';
      s += '<text x="' + right + '" y="' + weekLabelY + '" text-anchor="end" style="font: 10px \'JetBrains Mono\', monospace; fill: #6b7773; letter-spacing: 0.08em;">TODAY</text>';

      svg.innerHTML = s;
    }

    renderChart();
  </script>
</body>
</html>
