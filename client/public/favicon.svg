<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- scale body - square with rounded corners -->
  <rect x="4" y="16" width="56" height="44" rx="6" fill="#4f46e5"/>
  <!-- top surface highlight -->
  <rect x="4" y="16" width="56" height="8" rx="6" fill="#6366f1"/>
  <!-- display circle -->
  <circle cx="32" cy="42" r="14" fill="#e0e7ff"/>
  <!-- tick marks -->
  <line x1="32" y1="29" x2="32" y2="32" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="19" y1="42" x2="22" y2="42" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="42" y1="42" x2="45" y2="42" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="23" y1="33" x2="25" y2="35" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="41" y1="33" x2="39" y2="35" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round"/>
  <!-- needle -->
  <line x1="32" y1="42" x2="40" y2="34" stroke="#4f46e5" stroke-width="2" stroke-linecap="round"/>
  <!-- center dot -->
  <circle cx="32" cy="42" r="2" fill="#4f46e5"/>
  <!-- feet -->
  <rect x="8" y="58" width="8" height="4" rx="2" fill="#3730a3"/>
  <rect x="48" y="58" width="8" height="4" rx="2" fill="#3730a3"/>
</svg>
