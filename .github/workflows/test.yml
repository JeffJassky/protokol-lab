name: test

# Unit + integration tests. Cheap (~30s) — runs on every PR and every push
# to main so a regression blocks merge. E2E (Playwright) is in a separate
# workflow because it's slower and pulls a browser download.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  server:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install server deps
        working-directory: server
        run: npm ci

      - name: Run server tests
        working-directory: server
        run: npm test
        env:
          NODE_ENV: test
          # mongodb-memory-server downloads a mongod binary on first run.
          # Default location is fine; cache lives under ~/.cache.
          MONGOMS_DOWNLOAD_DIR: ~/.cache/mongodb-binaries

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: server-test-logs
          path: |
            server/coverage
            /tmp/protokol-lab-server.log
          if-no-files-found: ignore
          retention-days: 7

  client:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install client deps
        working-directory: client
        # Skip Puppeteer's Chromium download — only needed for the prerender
        # build step, not for tests.
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'
        run: npm ci

      - name: Run client tests
        working-directory: client
        run: npm test
