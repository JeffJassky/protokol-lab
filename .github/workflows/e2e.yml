name: e2e

# Playwright end-to-end tests. Heavier than the unit suite because it boots
# the full stack (server + client + in-memory Mongo) and downloads a browser.
# Schedule:
#   - Nightly cron (07:00 UTC = 02:00 CT) catches drift before the workday
#   - Manual dispatch for ad-hoc runs from a feature branch
#   - On every PR labeled `e2e` so risky changes get gated explicitly
# (We deliberately don't run on every PR — keep merges fast unless tagged.)

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:
  pull_request:
    types: [labeled, synchronize]
    branches: [main]

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright:
    # Skip on label events that aren't "e2e"; run only when the PR carries
    # the e2e label or the workflow is dispatched/scheduled.
    if: >
      github.event_name != 'pull_request' ||
      contains(github.event.pull_request.labels.*.name, 'e2e')
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root deps (Playwright)
        run: npm ci

      - name: Install server deps
        working-directory: server
        run: npm ci

      - name: Install client deps
        working-directory: client
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Generate throwaway VAPID keys
        # Server's initPush() crashes at boot without these. CI never pushes
        # to anyone, so a fresh pair per run is fine.
        run: |
          node <<'EOF' >> "$GITHUB_ENV"
          const { generateVAPIDKeys } = require('./server/node_modules/web-push');
          const k = generateVAPIDKeys();
          console.log(`VAPID_PUBLIC_KEY=${k.publicKey}`);
          console.log(`VAPID_PRIVATE_KEY=${k.privateKey}`);
          EOF

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 14
