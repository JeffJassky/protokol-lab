name: e2e

# Playwright end-to-end tests against an ephemeral mem-mongo stack.
#
# Triggers:
#   - Every PR + push to main: gates merge + deploy. e2e is the most
#     comprehensive pre-deploy layer (see docs/testing.md), so we pay the
#     ~2-3min cost on every change to keep regressions out of prod.
#   - Nightly cron (07:00 UTC) catches dependency / browser drift even on
#     branches that don't see commits.
#   - Manual dispatch for ad-hoc runs.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root deps (Playwright)
        run: npm ci

      # @kyneticbio/core is referenced via file:../core. Not published to
      # npm — this script clones+builds it into log/core (or symlinks the
      # local sibling on dev machines).
      - name: Vendor @kyneticbio/core
        run: node scripts/ensure-core.mjs

      # Server depends on @jeffjassky/marketing-admin via file:../marketing.
      # That package's runtime imports need its own node_modules populated.
      # --legacy-peer-deps mirrors the heroku-postbuild step.
      - name: Install marketing deps
        working-directory: marketing
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'
        run: npm ci --legacy-peer-deps

      - name: Install server deps
        working-directory: server
        run: npm ci

      - name: Install client deps
        working-directory: client
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Generate throwaway VAPID keys
        # Server's initPush() crashes at boot without these. CI never pushes
        # to anyone, so a fresh pair per run is fine.
        run: |
          node <<'EOF' >> "$GITHUB_ENV"
          const { generateVAPIDKeys } = require('./server/node_modules/web-push');
          const k = generateVAPIDKeys();
          console.log(`VAPID_PUBLIC_KEY=${k.publicKey}`);
          console.log(`VAPID_PRIVATE_KEY=${k.privateKey}`);
          EOF

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 14
