    <style data-src-loc="1910:1917:5676">
      /* Neutral, color-free surface so we evaluate shape only */
      :root {
        --bg:        #1a1a1a;
        --surface:   #232323;
        --border:    #2e2e2e;
        --border-2:  #3a3a3a;
        --ink:       #f5f5f5;
        --ink-2:     #b8b8b8;
        --ink-dim:   #6a6a6a;
        --mono: 'JetBrains Mono', ui-monospace, monospace;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; padding: 0; background: var(--bg); color: var(--ink);
        font-family: var(--mono); font-size: 13px;
        -webkit-font-smoothing: antialiased;
      }

      .wrap { max-width: 1480px; margin: 0 auto; padding: 56px 32px 96px; }

      /* Page header */
      .page-head {
        margin-bottom: 56px; padding-bottom: 24px;
        border-bottom: 1px solid var(--border);
      }
      .page-head h1 {
        margin: 0 0 8px; font-size: 28px; font-weight: 700;
        letter-spacing: -0.01em;
      }
      .page-head .sub {
        color: var(--ink-dim); font-size: 12px;
        text-transform: uppercase; letter-spacing: 0.14em;
      }

      /* Section */
      .sec { margin-bottom: 72px; }
      .sec-head {
        display: flex; align-items: baseline; gap: 16px;
        margin-bottom: 24px; padding-bottom: 12px;
        border-bottom: 1px solid var(--border);
      }
      .sec-num {
        font-size: 11px; color: var(--ink-2); font-weight: 700;
        letter-spacing: 0.14em;
      }
      .sec-title {
        font-size: 18px; font-weight: 700; letter-spacing: -0.005em;
      }
      .sec-desc {
        color: var(--ink-dim); font-size: 12px; margin-left: auto;
      }

      /* Logo grid */
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 1px; background: var(--border);
        border: 1px solid var(--border);
      }
      .cell {
        background: var(--surface);
        aspect-ratio: 1 / 1;
        display: flex; flex-direction: column;
        position: relative; overflow: hidden;
      }
      .cell-stage {
        flex: 1;
        display: flex; align-items: center; justify-content: center;
        position: relative;
      }
      .cell-foot {
        padding: 8px 12px; border-top: 1px solid var(--border);
        display: flex; align-items: center; gap: 8px;
        font-size: 9.5px; color: var(--ink-dim);
        text-transform: uppercase; letter-spacing: 0.1em;
        background: rgba(0,0,0,0.18);
      }
      .cell-id {
        color: var(--ink-2); font-weight: 700;
        margin-right: auto;
      }
      .cell-mini {
        width: 22px; height: 22px;
        display: flex; align-items: center; justify-content: center;
        border: 1px solid var(--border-2);
        background: var(--bg);
      }
      .grid-tight { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
      .grid-wide  { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }

      /* Wordmark grid */
      .word-grid {
        display: grid; grid-template-columns: 1fr; gap: 1px;
        background: var(--border); border: 1px solid var(--border);
      }
      .word-cell {
        background: var(--surface);
        padding: 32px 36px;
        display: flex; align-items: center; gap: 28px;
      }
      .word-cell .wm-mark {
        width: 64px; height: 64px; flex-shrink: 0;
        display: flex; align-items: center; justify-content: center;
      }
      .word-cell .wm-text { flex: 1; min-width: 0; }
      .word-cell .wm-foot {
        font-size: 10px; color: var(--ink-dim);
        text-transform: uppercase; letter-spacing: 0.14em;
        text-align: right; min-width: 140px;
      }

      /* Scale-test row */
      .scale-row {
        display: flex; align-items: center; gap: 0;
        background: var(--surface); border: 1px solid var(--border);
        padding: 32px;
      }
      .scale-step {
        display: flex; flex-direction: column; align-items: center; gap: 12px;
        padding: 0 28px; border-right: 1px solid var(--border);
      }
      .scale-step:last-child { border-right: none; }
      .scale-step .label {
        font-size: 9.5px; color: var(--ink-dim); text-transform: uppercase;
        letter-spacing: 0.12em;
      }
    </style>

      // ============================================================================
      // ABSORPTION-CURVE GENERATORS — same as before, drawn in a 100×100 viewBox
      // ============================================================================
      function curvePath(profile, samples = 60) {
        const fns = {
          bolus: (t) => {
            if (t < 0.005) return Math.pow(t / 0.005, 0.5);
            return Math.exp(-3 * t);
          },
          subq: (t) => (1 / 0.78) * (Math.exp(-1.4 * t) - Math.exp(-6 * t)),
          oral: (t) => {
            const lag = 0.06;
            if (t < lag) return 0;
            const tt = t - lag;
            return (0.72 / 0.62) * (Math.exp(-1.0 * tt) - Math.exp(-3.5 * tt));
          },
        };
        const f = fns[profile];
        const pts = [];
        for (let i = 0; i <= samples; i++) {
          const t = i / samples;
          const y = f(t);
          pts.push([t * 100, 100 - y * 90]);
        }
        return pts.map((p, i) => `${i === 0 ? 'M' : 'L'}${p[0].toFixed(2)},${p[1].toFixed(2)}`).join(' ');
      }

      // ============================================================================
      // CELL — wraps a mark + footer with mini preview
      // ============================================================================
      // Quote a font-family name properly so SVG <text> picks it up.
      // React inlines style fontFamily without quotes which breaks multi-word names.
      function ff(name) { return `"${name}"`; }
      function Cell({ id, label, scale = 0.62, children }) {
        return (
          <div className="cell">
            <div className="cell-stage" style={{ padding: '20px' }}>
              <div style={{ width: `${scale * 100}%`, aspectRatio: '1/1' }}>
                {children}
              </div>
            </div>
            <div className="cell-foot">
              <span className="cell-id">{id}</span>
              <span style={{ flex: 1, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{label}</span>
              <span className="cell-mini">
                <div style={{ width: 14, height: 14 }}>{children}</div>
              </span>
            </div>
          </div>
        );
      }

      // ============================================================================
      // === SECTION 1 — TYPE STUDIES (fonts, weights, casings) ====================
      // ============================================================================

      // Helpers ---------------------------------------------------------------
      function TypeMark({ text, font, weight, tracking = '-0.04em', size = 56, dy = 62, x = 50 }) {
        return (
          <svg viewBox="0 0 100 100" width="100%" height="100%">
            <text x={x} y={dy} textAnchor="middle"
              fontFamily={ff(font)} fontWeight={weight} fontSize={size}
              style={{ fill: 'var(--ink)', letterSpacing: tracking }}>
              {text}
            </text>
          </svg>
        );
      }

      // Custom geometric "PK" — built letterforms (no font dependence).
      // Both letters constructed from solid rectangles + diagonals in a 100×100 vbox.
      function GeoPK({ thickness = 12, oblique = 0 }) {
        const t = thickness;
        const top = 22, bot = 78, h = bot - top;       // letter height = 56

        // Layout: P at left, K at right, gap between.
        const pX = 16;        const pW = 28;            // P bbox: x∈[16,44]
        const kX = 56;        const kW = 28;            // K bbox: x∈[56,84]
        const bowlH = h * 0.55;                         // bowl height (top portion of P)

        return (
          <svg viewBox="0 0 100 100" width="100%" height="100%"
            style={{ transform: oblique ? `skewX(${oblique}deg)` : 'none', transformOrigin: '50px 50px' }}>
            {/* ── P ── */}
            {/* vertical stem (full height) */}
            <rect x={pX} y={top} width={t} height={h} fill="var(--ink)" />
            {/* top horizontal of bowl */}
            <rect x={pX} y={top} width={pW} height={t} fill="var(--ink)" />
            {/* right vertical of bowl */}
            <rect x={pX + pW - t} y={top} width={t} height={bowlH} fill="var(--ink)" />
            {/* bottom horizontal of bowl */}
            <rect x={pX} y={top + bowlH - t} width={pW} height={t} fill="var(--ink)" />

            {/* ── K ── */}
            {/* vertical stem */}
            <rect x={kX} y={top} width={t} height={h} fill="var(--ink)" />
            {/* upper diagonal arm: from stem-right at midline → top-right corner */}
            <polygon
              points={`
                ${kX + t},${top + h/2 - t/3}
                ${kX + kW - t * 0.6},${top}
                ${kX + kW},${top}
                ${kX + t},${top + h/2 + t/3}
              `}
              fill="var(--ink)" />
            {/* lower diagonal arm: from stem-right at midline → bottom-right corner */}
            <polygon
              points={`
                ${kX + t},${top + h/2 - t/3}
                ${kX + kW},${bot}
                ${kX + kW - t * 0.6},${bot}
                ${kX + t},${top + h/2 + t/3}
              `}
              fill="var(--ink)" />
          </svg>
        );
      }

      // Lockup of curve overlay variants for type+curve experiments
      function CurveOver({ profile, alignY = 36, scale = 0.96, scaleY = 0.55, weight = 5, opacity = 0.9 }) {
        const path = curvePath(profile);
        return (
          <g transform={`translate(${(100 - scale * 100) / 2}, ${alignY}) scale(${scale}, ${scaleY})`}>
            <path d={path} fill="none" stroke="var(--ink)" strokeWidth={weight}
              strokeLinejoin="round" strokeLinecap="round" opacity={opacity} />
          </g>
        );
      }

      // ============================================================================
      // === MARKS — TYPE-ONLY studies (no curve) ==================================
      // ============================================================================
      const TypeStudies = [

              </div>
            </div>

            {/* 01 · Type-only studies */}
            <section className="sec">
              <div className="sec-head">
                <span className="sec-num">01</span>
                <span className="sec-title">Type alone — does the monogram hold?</span>
                <span className="sec-desc">{TypeStudies.length} variations across font / weight / case</span>
              </div>
              <div className="grid grid-tight">
                {TypeStudies.map((s) => <Cell key={s.id} id={s.id} label={s.label}>{s.mark}</Cell>)}
              </div>
            </section>

            {/* 02 · Built letterforms */}
            <section className="sec">
              <div className="sec-head">
                <span className="sec-num">02</span>
                <span className="sec-title">Built letterforms (non-typographic)</span>
                <span className="sec-desc">Custom geometric construction — full control of stroke & proportion</span>
              </div>
              <div className="grid grid-tight">
                {GeoStudies.map((s) => <Cell key={s.id} id={s.id} label={s.label}>{s.mark}</Cell>)}
              </div>
            </section>

            {/* 03 · Curve-only studies */}
            <section className="sec">
              <div className="sec-head">
                <span className="sec-num">03</span>
                <span className="sec-title">Curve alone — silhouette studies</span>
                <span className="sec-desc">Three absorption profiles, multiple weights and treatments</span>
              </div>
              <div className="grid grid-tight">
                {CurveStudies.map((s) => <Cell key={s.id} id={s.id} label={s.label}>{s.mark}</Cell>)}
              </div>
            </section>

            {/* 04 · Compositions */}
            <section className="sec">
              <div className="sec-head">
                <span className="sec-num">04</span>
                <span className="sec-title">Type + curve compositions</span>
                <span className="sec-desc">{ComposeStudies.length} layout/architecture experiments</span>
              </div>
              <div className="grid grid-tight">
                {ComposeStudies.map((s) => <Cell key={s.id} id={s.id} label={s.label}>{s.mark}</Cell>)}
              </div>
            </section>

            {/* 05 · Scale tests */}
            <section className="sec">
              <div className="sec-head">
                <span className="sec-num">05</span>
                <span className="sec-title">Scale tests — does it survive at 16px?</span>
                <span className="sec-desc">Four candidates rendered 96 → 16 px</span>
              </div>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
                <ScaleRow label="Underline · Sub-Q" render={() => <UnderlineMark profile="subq" />} />
                <ScaleRow label="Underline · Bolus" render={() => <UnderlineMark profile="bolus" />} />
                <ScaleRow label="Stacked · Sub-Q" render={() => <StackedMark profile="subq" />} />
                <ScaleRow label="Type only · JBM 700" render={() => <TypeMark text="PK" font="JetBrains Mono" weight={700} />} />
                <ScaleRow label="Built · 12u" render={() => <GeoPK thickness={12} />} />
                <ScaleRow label="Knockout · Sub-Q" render={() => <NegativeMark profile="subq" />} />
              </div>
            </section>

            {/* 06 · Wordmark lockups */}
            <section className="sec">
              <div className="sec-head">
                <span className="sec-num">06</span>
                <span className="sec-title">Wordmark lockups</span>
                <span className="sec-desc">"Protokol" and "Protokol Lab" alongside top mark candidates</span>
              </div>
              <div className="word-grid">
                <Wordmark markEl={<UnderlineMark profile="subq" />} name="Protokol" />
                <Wordmark markEl={<UnderlineMark profile="subq" />} name="Protokol" sub="LAB" />
                <Wordmark markEl={<UnderlineMark profile="bolus" />} name="Protokol" sub="LAB" />
                <Wordmark markEl={<UnderlineMark profile="oral" />} name="Protokol" sub="LAB" />
                <Wordmark markEl={<StackedMark profile="subq" />} name="Protokol" sub="LAB" />
                <Wordmark markEl={<NegativeMark profile="subq" />} name="Protokol" sub="LAB" />
                <Wordmark markEl={<GeoPK thickness={12} />} name="Protokol" sub="LAB" />
                <Wordmark markEl={<TypeMark text="PK" font="JetBrains Mono" weight={700} />} name="Protokol" sub="LAB" />
                <Wordmark markEl={<UnderlineMark profile="subq" />} name="Protokol" sub="LAB" font="Inter" weight={800} size={38} />
                <Wordmark markEl={<UnderlineMark profile="subq" />} name="Protokol" sub="LAB" font="Space Grotesk" weight={700} size={36} />
              </div>
            </section>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
  </body>
