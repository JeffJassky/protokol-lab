<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Protokol [LAB] · Email Program Workbench</title>
<link rel="preconnect" href="https://fonts.gstatic.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0f0c1a;
    --bg-2: #181427;
    --bg-3: #1f1b32;
    --bg-4: #271f3f;
    --line: rgba(255,255,255,0.08);
    --line-2: rgba(255,255,255,0.14);
    --text: rgba(255,255,255,0.95);
    --text-2: rgba(255,255,255,0.72);
    --text-3: rgba(255,255,255,0.5);
    --purple: #3fb26a;
    --purple-light: #5bf591;
    --purple-dark: #1e8047;
    --c-activation: #27ccf8;
    --c-engagement: #86ee8f;
    --c-conversion: #ff6868;
    --c-retention: #b675ff;
    --c-churn: #ff9a69;
    --c-advocacy: #ffaced;
    --c-broadcast: #f9b740;
    --c-fallback: #b7bec7;
    --mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
    --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); }
  body { display: flex; min-height: 100vh; }

  /* ----- Sidebar ----- */
  aside.sidebar {
    width: 360px;
    flex-shrink: 0;
    border-right: 1px solid var(--line);
    background: var(--bg-2);
    display: flex; flex-direction: column;
    height: 100vh; position: sticky; top: 0;
  }
  .brand {
    display: flex; align-items: center; gap: 12px;
    padding: 22px 24px;
    border-bottom: 1px solid var(--line);
    cursor: pointer;
  }
  .brand:hover { background: var(--bg-3); }
  .brand .logo {
    width: 32px; height: 32px; border-radius: 0;
    background: #5bf591;
    display: inline-flex; align-items: center; justify-content: center;
    font-family: var(--mono); font-size: 14px; font-weight: 800; letter-spacing: -0.02em;
    color: #0b0f0c;
  }
  .brand h1 { margin: 0; font-family: var(--mono); font-size: 13px; font-weight: 700; letter-spacing: -0.01em; }
  .brand h1 .lab-badge { display: inline-block; border: 1px solid currentColor; padding: 2px 6px; font-size: 9px; letter-spacing: 0.2em; font-weight: 600; margin-left: 6px; vertical-align: 1px; }
  .brand h1 small { display: block; font-weight: 500; font-size: 10px; color: var(--text-3); margin-top: 4px; letter-spacing: 0.08em; text-transform: uppercase; font-family: var(--sans); }

  .meta-summary {
    padding: 14px 24px;
    border-bottom: 1px solid var(--line);
    color: var(--text-3);
    font-size: 12px;
    line-height: 1.6;
  }
  .meta-summary strong { color: var(--text-2); font-weight: 600; }
  .meta-summary .num { color: var(--purple-light); font-weight: 700; }

  nav.flows {
    padding: 12px 8px;
    overflow-y: auto;
    flex: 1;
  }
  .flow-group {
    margin-bottom: 4px;
  }
  .flow-header {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 10px;
    background: transparent;
    border: 1px solid transparent;
    color: var(--text-2);
    padding: 10px 12px;
    border-radius: 10px;
    cursor: pointer;
    text-align: left;
    font-family: var(--sans);
    font-size: 12px;
    transition: all .15s ease;
  }
  .flow-header:hover { background: var(--bg-3); color: var(--text); }
  .flow-header.active {
    background: var(--bg-3);
    border-color: var(--line-2);
    color: var(--text);
  }
  .flow-header .caret {
    width: 16px; height: 16px;
    color: var(--text-3);
    transition: transform .15s ease;
    flex-shrink: 0;
  }
  .flow-header.expanded .caret { transform: rotate(90deg); }
  .flow-header .meta {
    flex: 1;
    min-width: 0;
  }
  .flow-header .title {
    font-weight: 600;
    font-size: 13px;
    line-height: 1.2;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .flow-header .sub {
    display: flex; align-items: center; gap: 8px;
    margin-top: 4px;
    font-size: 10px;
    color: var(--text-3);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .flow-header .stage-dot {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--c-fallback);
  }
  .flow-header[data-stage="activation"] .stage-dot { background: var(--c-activation); }
  .flow-header[data-stage="engagement"] .stage-dot { background: var(--c-engagement); }
  .flow-header[data-stage="conversion"] .stage-dot { background: var(--c-conversion); }
  .flow-header[data-stage="retention"] .stage-dot { background: var(--c-retention); }
  .flow-header[data-stage="churn"] .stage-dot { background: var(--c-churn); }
  .flow-header[data-stage="advocacy"] .stage-dot { background: var(--c-advocacy); }
  .flow-header[data-stage="broadcast"] .stage-dot { background: var(--c-broadcast); }
  .flow-header[data-stage="fallback"] .stage-dot { background: var(--c-fallback); }

  .flow-header .count {
    color: var(--text-3);
    font-family: var(--mono);
    font-size: 11px;
    margin-left: 4px;
  }

  .email-list {
    margin: 4px 0 8px 32px;
    padding-left: 12px;
    border-left: 1px solid var(--line);
    display: none;
  }
  .flow-group.expanded .email-list { display: block; }
  .email-item {
    display: block;
    width: 100%;
    text-align: left;
    background: transparent;
    border: 0;
    color: var(--text-3);
    padding: 7px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-family: var(--sans);
    font-size: 12px;
    line-height: 1.3;
    margin: 1px 0;
    transition: all .12s ease;
  }
  .email-item:hover { background: var(--bg-3); color: var(--text-2); }
  .email-item.active { background: var(--bg-3); color: var(--text); }
  .email-item .num { color: var(--text-3); font-family: var(--mono); margin-right: 6px; }
  .email-item.active .num { color: var(--purple-light); }
  .email-item .subj { font-weight: 500; }

  /* ----- Main pane ----- */
  main.detail {
    flex: 1; min-width: 0;
    padding: 36px 48px 80px;
    overflow-x: hidden;
  }

  .breadcrumb {
    display: flex; align-items: center; gap: 8px;
    font-family: var(--mono); font-size: 11px; color: var(--text-3);
    margin-bottom: 16px;
  }
  .breadcrumb a {
    color: var(--text-2);
    text-decoration: none;
    cursor: pointer;
  }
  .breadcrumb a:hover { color: var(--purple-light); }
  .breadcrumb .sep { color: var(--text-3); }

  .topline {
    display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
    font-family: var(--mono); font-size: 11px; color: var(--text-3);
    margin-bottom: 14px;
  }
  .topline .chip { padding: 3px 10px; border-radius: 999px; background: var(--bg-3); color: var(--text-2); }
  .topline .chip.stage { color: var(--text); font-weight: 600; }
  .topline .chip.stage[data-stage="activation"] { background: rgba(39,204,248,0.18); color: var(--c-activation); }
  .topline .chip.stage[data-stage="engagement"] { background: rgba(134,238,143,0.18); color: var(--c-engagement); }
  .topline .chip.stage[data-stage="conversion"] { background: rgba(255,104,104,0.18); color: var(--c-conversion); }
  .topline .chip.stage[data-stage="retention"] { background: rgba(180,117,255,0.22); color: var(--c-retention); }
  .topline .chip.stage[data-stage="churn"] { background: rgba(255,154,105,0.18); color: var(--c-churn); }
  .topline .chip.stage[data-stage="advocacy"] { background: rgba(255,172,237,0.18); color: var(--c-advocacy); }
  .topline .chip.stage[data-stage="broadcast"] { background: rgba(249,183,64,0.18); color: var(--c-broadcast); }
  .topline .chip.stage[data-stage="fallback"] { background: rgba(183,190,199,0.18); color: var(--c-fallback); }
  .topline .chip.priority { background: var(--purple); color: white; font-weight: 700; }

  h1.page-title {
    font-size: 32px; line-height: 1.15; font-weight: 700; letter-spacing: -0.025em;
    margin: 0 0 8px;
  }
  h2.subject {
    font-size: 28px; line-height: 1.2; font-weight: 700; letter-spacing: -0.025em;
    margin: 0 0 8px;
  }
  .preheader {
    font-size: 14px; color: var(--text-2); margin-bottom: 28px; font-style: italic;
  }
  .lead {
    font-size: 15px; color: var(--text-2); line-height: 1.65; margin-bottom: 24px; max-width: 700px;
  }

  .props {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 0;
    background: var(--bg-2);
    border: 1px solid var(--line);
    border-radius: 12px;
    margin-bottom: 28px;
  }
  .props .prop {
    padding: 14px 18px;
    border-right: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
  }
  .props .prop:nth-child(2n) { border-right: none; }
  .props .prop:nth-last-child(-n+2) { border-bottom: none; }
  .props .prop.wide { grid-column: span 2; border-right: none; }
  .prop .k { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-3); margin-bottom: 4px; font-weight: 600; }
  .prop .v { font-size: 13px; color: var(--text); font-family: var(--mono); line-height: 1.5; }
  .prop .v.normal { font-family: var(--sans); }

  section.block { margin-bottom: 32px; }
  section.block h3 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-3);
    margin: 0 0 10px;
    font-weight: 700;
  }
  .rationale {
    background: var(--bg-2);
    border: 1px solid var(--line);
    border-left: 3px solid var(--purple);
    border-radius: 10px;
    padding: 18px 22px;
    color: var(--text-2);
    line-height: 1.65;
    font-size: 14px;
  }
  .rationale ul { margin: 6px 0 0; padding-left: 20px; }
  .rationale li { margin: 6px 0; }
  .rationale strong { color: var(--text); font-weight: 600; }
  .rationale p { margin: 0 0 12px; }
  .rationale p:last-child { margin-bottom: 0; }

  /* Tabs */
  .tabs {
    display: flex; gap: 4px; margin-bottom: 14px;
    border-bottom: 1px solid var(--line);
  }
  .tab {
    background: transparent; border: 0;
    color: var(--text-3);
    padding: 10px 16px;
    font-family: var(--sans); font-size: 13px; font-weight: 600;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    letter-spacing: 0.02em;
  }
  .tab:hover { color: var(--text-2); }
  .tab.active { color: var(--text); border-bottom-color: var(--purple-light); }

  .panel { display: none; }
  .panel.active { display: block; }

  .actions { display: flex; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
  .btn {
    background: var(--purple); color: white;
    border: 0; padding: 9px 16px; font-size: 12px; font-weight: 600;
    border-radius: 8px;
    font-family: var(--sans); cursor: pointer;
    letter-spacing: 0.02em;
    transition: all .15s ease;
    box-shadow: 0 6px 18px -8px rgba(93, 48, 255, 0.65);
  }
  .btn:hover { background: var(--purple-light); transform: translateY(-1px); }
  .btn.alt { background: var(--bg-3); color: var(--text); box-shadow: none; border: 1px solid var(--line-2); }
  .btn.alt:hover { background: var(--bg); }
  .btn .ok { display: none; }
  .btn.copied .ok { display: inline; }
  .btn.copied .label { display: none; }
  .btn.copied { background: var(--c-engagement); color: #0f0c1a; }

  .iframe-wrap {
    background: #e9edf3;
    border-radius: 12px;
    padding: 20px;
    border: 1px solid var(--line);
    min-height: 600px;
  }
  iframe.email-preview {
    width: 100%; max-width: 660px; min-height: 800px;
    display: block; margin: 0 auto;
    border: 0; background: white;
    border-radius: 8px;
    box-shadow: 0 20px 60px -20px rgba(0,0,0,0.5);
  }

  pre.code {
    background: #0a0814;
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 20px;
    overflow: auto;
    max-height: 70vh;
    font-family: var(--mono); font-size: 12px;
    line-height: 1.6;
    color: #d6d1f0;
    margin: 0;
  }

  /* Per-email timeline (within a flow) */
  .timeline {
    display: flex; align-items: center; margin-bottom: 32px;
    background: var(--bg-2); border: 1px solid var(--line); border-radius: 12px;
    padding: 18px 22px; overflow-x: auto;
  }
  .timeline .dot {
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--bg-3); border: 1px solid var(--line-2);
    color: var(--text-2);
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700;
    flex-shrink: 0;
    cursor: pointer;
    transition: all .15s ease;
  }
  .timeline .dot:hover { border-color: var(--purple-light); color: var(--text); }
  .timeline .dot.active {
    background: var(--purple); color: white; border-color: var(--purple-light);
    box-shadow: 0 6px 20px -6px rgba(93,48,255,0.7);
  }
  .timeline .seg {
    height: 1px; flex: 1; background: var(--line-2); min-width: 28px;
    position: relative;
  }
  .timeline .seg span {
    position: absolute; top: -22px; left: 50%; transform: translateX(-50%);
    font-size: 10px; color: var(--text-3); font-family: var(--mono); white-space: nowrap;
  }

  /* Program overview map */
  .program-map {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px; margin-bottom: 32px;
  }
  .program-card {
    background: var(--bg-2);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 20px;
    cursor: pointer;
    transition: all .15s ease;
    text-align: left;
    font-family: var(--sans);
    color: var(--text);
  }
  .program-card:hover {
    transform: translateY(-2px);
    border-color: var(--purple-light);
    box-shadow: 0 14px 40px -20px rgba(93, 48, 255, 0.55);
  }
  .program-card.priority {
    border-color: var(--purple-light);
    box-shadow: 0 8px 30px -16px rgba(93, 48, 255, 0.55);
  }
  .program-card .card-stage {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 700;
    color: var(--text-3);
    margin-bottom: 10px;
  }
  .program-card .card-title { font-size: 16px; font-weight: 700; line-height: 1.25; margin-bottom: 8px; }
  .program-card .card-trigger { font-size: 12px; color: var(--text-2); font-family: var(--mono); margin-bottom: 12px; }
  .program-card .card-desc { font-size: 13px; color: var(--text-2); line-height: 1.55; }
  .program-card .card-footer {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--line);
    font-size: 11px; color: var(--text-3); font-family: var(--mono);
  }
  .program-card .card-footer .badge {
    padding: 2px 8px; border-radius: 999px; font-weight: 700;
    background: var(--purple); color: white; font-size: 10px;
  }

  /* Email list inside flow detail */
  .email-table {
    background: var(--bg-2);
    border: 1px solid var(--line);
    border-radius: 12px;
    overflow: hidden;
  }
  .email-row {
    display: grid;
    grid-template-columns: 60px 100px 1fr 200px;
    gap: 12px;
    padding: 14px 18px;
    border-bottom: 1px solid var(--line);
    cursor: pointer;
    align-items: center;
    transition: background .12s ease;
  }
  .email-row:last-child { border-bottom: 0; }
  .email-row:hover { background: var(--bg-3); }
  .email-row .row-num {
    width: 28px; height: 28px;
    background: var(--purple); color: white;
    border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 12px;
  }
  .email-row .row-delay {
    font-family: var(--mono); font-size: 12px; color: var(--text-3);
  }
  .email-row .row-subject { font-size: 14px; font-weight: 600; color: var(--text); }
  .email-row .row-preheader { font-size: 12px; color: var(--text-3); margin-top: 2px; }
  .email-row .row-cta { font-size: 11px; color: var(--text-2); font-family: var(--mono); text-align: right; }

  ::selection { background: var(--purple); color: white; }

  @media (max-width: 1100px) {
    aside.sidebar { width: 300px; }
    main.detail { padding: 24px; }
  }
  @media (max-width: 800px) {
    body { flex-direction: column; }
    aside.sidebar { width: 100%; height: auto; position: relative; }
    nav.flows { max-height: 380px; }
  }
</style>
</head>
<body>

<aside class="sidebar">
  <div class="brand" id="brandHome">
    <div class="logo">PK</div>
    <h1>Protokol<span class="lab-badge">LAB</span><small>Email Program · Workbench</small></h1>
  </div>

  <div class="meta-summary">
    <strong>Flows:</strong> <span class="num" id="flowCount">14</span> &middot;
    <strong>Emails:</strong> <span class="num" id="emailCount">30</span> &middot;
    <strong>Broadcasts:</strong> <span class="num">1</span><br>
    <strong>Engine:</strong> Mailery (event-driven flows + suppression scopes)<br>
    <strong>Founder voice:</strong> Jeff Jassky
  </div>

  <nav class="flows" id="flowsNav"></nav>
</aside>

<main class="detail" id="detail">
  <!-- populated by JS -->
</main>

<script>
/* ===============================================================
   PROTOKOL [LAB] EMAIL PROGRAM — 14 flows + 1 broadcast, 30 emails.

   Behavioral lifecycle anchored on GLP-1 / peptide / compound tracking:
   onboarding → first-dose → titration → plateau → maintenance →
   cycle-off → re-engagement. Fired through Mailery (event-driven flows,
   wait / condition / branch / send / tag steps, scope-aware suppression).

   Architecture: each flow is an object with metadata + array of
   emails. Emails inline as JS so this works from file:// without
   a server.
   =============================================================== */

const FROM_NAME = 'Jeff Jassky';
const FROM_EMAIL = 'jeff@jeffjassky.com';
const AVATAR = 'https://storage.mlcdn.com/account_image/449716/Fn3InjJtPzA9W1mxNoG9NIyjHeZaNjEgqXsXy6Fc.jpg';

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function escapeAttr(s) { return escapeHtml(s); }

// Shared shell for every email. Body content slotted via {{BODY}}.
function shell({ preheader, body }) {
  return `<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<meta name="x-apple-disable-message-reformatting" />
<title>${escapeAttr(preheader)}</title>
</head>
<body style="margin:0;padding:0;background:#f5f5f7;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">

<!-- Preheader (hidden, inbox preview only) -->
<div style="display:none;font-size:1px;line-height:1px;max-height:0;max-width:0;opacity:0;overflow:hidden;mso-hide:all;">
  ${escapeHtml(preheader)}&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;
</div>

<table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background:#f5f5f7;">
  <tr><td align="center" style="padding:32px 16px;">
    <table role="presentation" width="600" cellpadding="0" cellspacing="0" border="0" style="max-width:600px;">
      <tr><td align="left" style="padding:0 8px 20px;">
        <a href="https://protokollab.com" style="text-decoration:none;color:#0f1a12;font-family:'JetBrains Mono',ui-monospace,SFMono-Regular,Menlo,monospace;font-size:16px;font-weight:700;letter-spacing:-0.01em;">
          <span style="display:inline-block;width:22px;height:22px;background:#5bf591;color:#0b0f0c;text-align:center;line-height:22px;font-size:11px;font-weight:800;letter-spacing:-0.04em;vertical-align:middle;margin-right:10px;">PK</span>Protokol&nbsp;<span style="display:inline-block;border:1px solid #0f1a12;padding:1px 6px;font-size:9px;letter-spacing:0.2em;font-weight:600;vertical-align:2px;">LAB</span>
        </a>
      </td></tr>
    </table>
    <table role="presentation" width="600" cellpadding="0" cellspacing="0" border="0" style="max-width:600px;background:#ffffff;border:1px solid #e0ebdd;box-shadow:0 4px 24px -8px rgba(15,26,18,0.08);">
      <tr><td style="padding:40px 44px;color:#1d1f23;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;font-size:16px;line-height:1.6;">
${body}
      </td></tr>
    </table>

function htmlToPlainText(html) {
  let s = html
    .replace(/<style[\s\S]*?<\/style>/gi, '')
    .replace(/<\!doctype[\s\S]*?>/gi, '')
    .replace(/<head[\s\S]*?<\/head>/gi, '')
    .replace(/<br\s*\/?>/gi, '\n')
    .replace(/<\/(p|li|tr|h[1-6]|td)>/gi, '\n')
    .replace(/<li[^>]*>/gi, '• ')
    .replace(/<a\s[^>]*href="([^"]+)"[^>]*>([\s\S]*?)<\/a>/gi, (_, href, text) =>
      text.replace(/<[^>]+>/g, '').trim() + ' (' + href + ')')
    .replace(/<[^>]+>/g, '')
    .replace(/&nbsp;/g, ' ')
    .replace(/&mdash;/g, '—')
    .replace(/&amp;/g, '&')
    .replace(/&lt;/g, '<')
    .replace(/&gt;/g, '>')
    .replace(/&#39;/g, "'")
    .replace(/&quot;/g, '"')
    .replace(/&zwnj;/g, '');
  return s.split('\n').map(l => l.replace(/[ \t]+/g, ' ').trim()).filter((l, i, a) => l || (i > 0 && a[i-1])).join('\n').trim();
}
